name: lumluay_pos
description: "Lumluay POS — Production-ready point-of-sale system"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI Framework
  shadcn_flutter: ^0.0.52

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Local Database (SQLite)
  drift: ^2.25.0
  sqlite3_flutter_libs: ^0.5.32

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  path_provider: ^2.1.5
  path: ^1.9.1
  connectivity_plus: ^6.1.4
  collection: ^1.19.1
  equatable: ^2.0.7
  logger: ^2.5.0
  json_annotation: ^4.9.0
  freezed_annotation: ^3.0.0
  slang: ^4.14.0
  slang_flutter: ^4.14.0
  crypto: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.15
  drift_dev: ^2.25.0
  riverpod_generator: ^2.6.5
  freezed: ^3.0.2
  json_serializable: ^6.9.5

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
